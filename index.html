<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fork()</title>
        <link rel="stylesheet" href="index.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    </head>
    </head>
    <body>
        <div id="canvas">
            <div class="node" id="root-node">
                <div class="node-card">
                    <textarea placeholder="Start you thought process here..."></textarea>
                    <button class="fork-btn">⑂ Fork()</button>
                </div>

                <div class="children"></div>
            </div>
        </div>

        <div class="bottom-right-controls">

            <div class="export-wrapper">
                <button id="export-toggle" title="Export Options">
                    <svg xmlns="https://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </button>
                <div id="export-dropdown" class="export-dropdown hidden">
                    <button id="export-png">PNG</button>
                    <button id="export-md">Markdown Text</button>
                    <button id="export-json">JSON Data</button>
                </div>
            </div>

            <div class="zoom-controls">
                <button id="zoom-out">-</button>
                <span id="zoom-level">100%</span>
                <button id="zoom-in">+</button>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
